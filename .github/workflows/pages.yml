name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Attestto-com/attestto-trust
          path: attestto-trust-checkout

      - name: Symlink attestto-trust as sibling for pnpm link
        run: ln -s "$GITHUB_WORKSPACE/attestto-trust-checkout" ../attestto-trust

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Stub guard
        run: |
          PATTERNS=(
            "// *(TODO|FIXME|HACK|XXX|PLACEHOLDER|placeholder)"
            "did:(web|example):demo"
            "did:(web|example):medico|did:example:"
            "['\"]fake[_-]|['\"]dummy[_-]|['\"]sample[_-]"
            "alert\(['\"]"
            "coming.?soon|próximamente|proximamente"
            "not yet implemented|not implemented"
            "'00000'|\"00000\""
          )
          EXCLUDE="node_modules/\|/dist/\|__tests__/\|__mocks__/\|/demo/\|/scripts/\|/fixtures/\|\.test\.\|\.spec\.\|vitest\.\|jest\."
          INCLUDE='\.ts:\|\.tsx:\|\.vue:\|\.js:\|\.mjs:'
          ALLOW='stub-guard-ignore\|i18n\.\|/i18n/\|/locales/\|@example\|/\*\*\|^ *\*'
          HITS=0
          for pat in "${PATTERNS[@]}"; do
            matches=$(grep -rEn -i "$pat" src 2>/dev/null | grep "$INCLUDE" | grep -v "$EXCLUDE" | grep -v "$ALLOW" || true)
            if [ -n "$matches" ]; then
              echo "$matches"
              HITS=$((HITS + $(echo "$matches" | wc -l)))
            fi
          done
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Stub guard failed: $HITS stub(s) found"
            exit 1
          fi
          echo "Stub guard passed"

      - run: pnpm vite build --config vite.config.pages.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
