<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Attestto Verify — Document Integrity & Digital Signature Verification</title>
    <meta name="description" content="Verify PDF integrity, digital signatures, and security properties. Open source, no login, no backend. Your file never leaves your device." />
    <meta name="keywords" content="PDF verification, digital signature, PAdES, document integrity, SHA-256, forensic audit, open source, decentralized identity, DID, vLEI, Web Components" />
    <meta name="author" content="Attestto" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://verify.attestto.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Attestto Verify — Document Integrity & Digital Signatures" />
    <meta property="og:description" content="Drop a PDF to verify its integrity, digital signatures, and security. 100% client-side. No data transmitted." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://verify.attestto.com" />
    <meta property="og:site_name" content="Attestto" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Attestto Verify — Document Integrity Verification" />
    <meta name="twitter:description" content="Verify PDF signatures and security. Open source, no login. Your file never leaves your device." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Attestto Verify",
      "url": "https://verify.attestto.com",
      "description": "Verify PDF integrity, digital signatures, and document security properties. Open source, client-side only.",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Any (browser-based)",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "license": "https://www.apache.org/licenses/LICENSE-2.0",
      "creator": {
        "@type": "Organization",
        "name": "Attestto",
        "url": "https://attestto.com"
      }
    }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f0f1a;
        color: #e2e8f0;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .header-bar {
        border-bottom: 1px solid #1e293b;
      }

      .logo {
        display: flex;
        align-items: center;
        text-decoration: none;
      }

      .logo img {
        height: 28px;
        width: auto;
      }

      nav { display: flex; gap: 1.5rem; }

      nav a {
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: color 0.15s;
      }

      nav a:hover, nav a.active { color: #e2e8f0; }

      main {
        max-width: 640px;
        margin: 3rem auto;
        padding: 0 1.5rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }

      .subtitle {
        color: #94a3b8;
        font-size: 1rem;
        margin-bottom: 2rem;
      }

      /* Dark theme overrides for web components */
      attestto-verify,
      attestto-sign {
        --attestto-text: #e2e8f0;
        --attestto-text-muted: #94a3b8;
        --attestto-primary: #594FD3;
        --attestto-primary-hover: #7B72ED;
        --attestto-success: #4ade80;
        --attestto-success-bg: #052e16;
        --attestto-warning: #fbbf24;
        --attestto-warning-bg: #422006;
        --attestto-border: #334155;
        --attestto-bg: #1e293b;
        --attestto-bg-hover: #1e1b4b;
        --attestto-bg-card: #0f172a;
        --attestto-bg-code: #1e293b;
        --attestto-bg-code-hover: #334155;
        --attestto-muted-bg: #1e293b;
      }

      .tab-bar {
        display: flex;
        gap: 0;
        margin-bottom: 2rem;
        border: 1px solid #334155;
        border-radius: 10px;
        overflow: hidden;
      }

      .tab {
        flex: 1;
        padding: 0.65rem;
        text-align: center;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        color: #94a3b8;
        background: transparent;
        border: none;
        transition: all 0.15s;
      }

      .tab:hover { color: #e2e8f0; }

      .tab.active {
        background: #1e293b;
        color: #e2e8f0;
      }

      .tab-content { display: none; }
      .tab-content.active { display: block; }

      footer {
        text-align: center;
        padding: 2rem;
        color: #475569;
        font-size: 0.8rem;
      }

      footer a { color: #594FD3; text-decoration: none; }

    </style>
  </head>
  <body>
    <div class="header-bar">
      <header>
        <a href="/" class="logo"><img src="/logo-full-white.svg" alt="Attestto" /></a>
        <nav>
          <a href="/" class="active">Verify</a>
          <a href="/sign">Sign</a>
          <a href="/docs">Docs</a>
          <a href="https://github.com/attestto/verify" target="_blank">GitHub</a>
        </nav>
      </header>
    </div>

    <main>
      <h1>Document Verification</h1>
      <p class="subtitle">Verify integrity and signatures — your file never leaves your device.</p>

      <div class="tab-bar">
        <button class="tab active" data-tab="verify">Verify</button>
        <button class="tab" data-tab="sign">Sign</button>
      </div>

      <div id="tab-verify" class="tab-content active">
        <attestto-verify></attestto-verify>
      </div>

      <div id="tab-sign" class="tab-content">
        <attestto-sign></attestto-sign>
      </div>
    </main>

    <footer>
      Open source under Apache 2.0 — <a href="https://github.com/attestto/verify">attestto/verify</a>
      <br />
      No data is transmitted. All verification happens in your browser.
    </footer>

    <script type="module" src="/src/index.ts"></script>
    <script>
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
          tab.classList.add('active')
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active')
        })
      })

    </script>
  </body>
</html>
